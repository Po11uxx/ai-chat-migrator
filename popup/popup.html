<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Migrator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <h1 class="title">AI Chat Migrator</h1>
        <button id="settingsToggle" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
      <div id="platformInfo" class="platform-info">
        <span id="platformDot" class="platform-dot"></span>
        <span id="platformName" class="platform-name">Detecting...</span>
      </div>
    </header>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel" style="display: none;">
      <div class="settings-title">
        <span class="text-zh">Gemini API 设置</span>
        <span class="text-en">Gemini API Settings</span>
      </div>
      <div class="api-key-row">
        <input id="apiKeyInput" type="password" class="input" placeholder="Paste your Gemini API Key" autocomplete="off" spellcheck="false">
        <button id="apiKeyToggleVis" class="icon-btn icon-btn-sm" title="Show/Hide">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="settings-hint">
        <span class="text-zh">免费获取：</span>
        <span class="text-en">Get free key at </span>
        <a href="#" id="aiStudioLink" class="link">aistudio.google.com</a>
      </div>
      <div class="settings-row">
        <label class="toggle-label">
          <span class="text-zh">AI 智能摘要</span>
          <span class="text-en">AI Summary</span>
        </label>
        <label class="toggle">
          <input id="aiSummaryToggle" type="checkbox">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div id="apiStatus" class="api-status" style="display: none;"></div>
    </div>

    <!-- Unsupported -->
    <div id="unsupported" class="unsupported" style="display: none;">
      <div class="unsupported-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p class="text-zh">当前页面不支持，请在 AI 对话页面使用</p>
      <p class="text-en">Unsupported page. Please open an AI chat page.</p>
    </div>

    <!-- Main -->
    <div id="mainArea" class="main-area">
      <!-- Capture button -->
      <button id="captureBtn" class="btn btn-primary">
        <span class="btn-zh">抓取当前对话</span>
        <span class="btn-en">Capture Conversation</span>
      </button>

      <!-- Loading -->
      <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <div class="loading-text">
          <span id="loadingZh" class="text-zh">正在抓取...</span>
          <span id="loadingEn" class="text-en">Capturing</span>
        </div>
      </div>

      <!-- Stats -->
      <div id="statsArea" class="stats-area" style="display: none;">
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-label">
              <span class="text-zh">对话轮数</span>
              <span class="text-en">Rounds</span>
            </span>
            <span id="statRounds" class="stat-value">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">
              <span class="text-zh">原始</span>
              <span class="text-en">Original</span>
            </span>
            <span id="statOriginal" class="stat-value">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">
              <span class="text-zh">压缩后</span>
              <span class="text-en">Compressed</span>
            </span>
            <span id="statCompressed" class="stat-value">-</span>
          </div>
        </div>
        <div id="compressionRate" class="compression-rate"></div>
        <div id="summaryMethod" class="summary-method"></div>
      </div>

      <!-- Target platform -->
      <div id="targetArea" class="target-area" style="display: none;">
        <label class="select-label" for="targetPlatform">
          <span class="text-zh">目标平台</span>
          <span class="text-en">Target</span>
        </label>
        <select id="targetPlatform" class="select">
          <option value="通用">General</option>
          <option value="ChatGPT">ChatGPT</option>
          <option value="Claude">Claude</option>
          <option value="Gemini">Gemini</option>
          <option value="DeepSeek">DeepSeek</option>
          <option value="Kimi">Kimi</option>
          <option value="豆包">Doubao</option>
        </select>
      </div>

      <!-- Copy button -->
      <button id="copyBtn" class="btn btn-secondary" style="display: none;" disabled>
        <span class="btn-zh">复制迁移 Prompt</span>
        <span class="btn-en">Copy Migration Prompt</span>
      </button>

      <!-- Success -->
      <div id="copySuccess" class="copy-success" style="display: none;">
        <span class="text-zh">已复制，去目标平台粘贴即可</span><br>
        <span class="text-en">Copied! Paste it into the target platform.</span>
      </div>

      <!-- Error -->
      <div id="errorMsg" class="error-msg" style="display: none;"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
